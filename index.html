<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/grid.css">
    <link rel="stylesheet" href="./assets/css/reponsive.css">
</head>
<body>
   <div class="app">
       <div class="container-app">
            <div class="grid">
                <div class="row app-container">
                    <div class="col l-6 m-12 c-12">
                        <div class="container-left">
                            <img src="./assets/img/logo.jpg" alt="">
                            <div class="container-left-content">
                                <div class="container-left-heading">
                                    or Sign in with
                                </div>
                                <div class="container-left-box">
                                    <a href="#">Sign in with <span>Google</span></a>
                                </div>
                                 <div class="container-left-box">
                                    <a href="#">Sign in with <span>Facebook</span></a>
                                </div>
                            </div>
                            <div class="container-left-overlay"></div>
                        </div>
                    </div>
                    <div class="col l-6 m-12 c-12">
                        <div class="container-right-content">
                            <div class="container-right-box">
                                <div class="container-right-logo">
                                    <img src="./assets/img/logo-full.svg" alt="">
                                </div>
                                <div class="container-right-des">
                                    <div class="container-right-des-heading">
                                        Login
                                    </div>
                                    <div class="container-right-des-form">
                                        <input type="text" placeholder="Username">
                                        <input type="password" placeholder="Password">
                                    </div>
                                    <div class="container-right-des-forgot">
                                        <div class="container-right-des-forgot-left">
                                            <input type="checkbox">
                                            <span>Remember me</span>
                                        </div>
                                        <div class="container-right-des-forgot-right">
                                            <a href="#">
                                                Forgot password?
                                            </a>
                                        </div>
                                    </div>
                                </div>
                                <div class="container-right-btn">
                                    <a href="#" class="container-right-btn">
                                        login
                                    </a>
                                </div>
                                <div class="container-right-have">
                                    Dont't have an account? 
                                    <span>
                                        <a href="#">
                                            Sign up!
                                        </a>
                                    </span>
                                </div>
                                <div class="container-right-sign">
                                    @ 2022 ANHFLASH TECHNOLOGY All rights reserved
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
       </div>
   </div> 
</body>
</html>
